<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Code Converter</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="bg-light">
    <!-- 🌟 Hero Section -->
    <header class="hero-section">
        <div class="hero-overlay">
            <h1 class="hero-title">Morse Code Converter</h1>
        </div>
    </header>
    <div class="container mt-5">
        <div class="row">
            <!-- Conversion Form -->
            <div class="col-md-6">
                <form method="POST" class="mb-3">
                    <textarea name="text" class="form-control mb-2" placeholder="Enter Text or Morse code"></textarea>
                    <select name="conversion" class="form-select mb-2">
                        <option value="text_to_morse">Text to Morse</option>
                        <option value="morse_to_text">Morse to Text</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100">Convert</button>
                </form>
                <h2 class="mt-4 text-center">Result:</h2>
                <p class="alert alert-secondary text-center" id="morse-output">{{ result }}</p>
            </div>
            
            <!-- Morse Code Dictionary -->
            <div class="col-md-6">
                <h3 class="text-center">Morse Code Reference</h3>
                <div class="table-responsive">
                    <table class="table table-bordered text-center">
                        <thead class="table-dark">
                            <tr><th>Character</th><th>Morse Code</th></tr>
                        </thead>
                        <tbody>
                            {% for char, code in morse_dict.items() %}
                            <tr><td>{{ char }}</td><td>{{ code }}</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
